name: beyond-nativeness
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - mmseqs2
  - pip
  - pip:
      # Core scientific stack
      - numpy==2.3.5
      - pandas==3.0.1
      - scipy==1.17.1
      - scikit-learn==1.8.0
      - matplotlib==3.10.8
      - umap-learn==0.5.11
      # Sequence I/O + UniProt API
      - biopython==1.86
      - requests==2.32.5
      - tqdm==4.67.3
      # Protein language models
      - torch==2.5.1
      - transformers==4.44.2
      - esm==3.2.1.post1
      - huggingface_hub==0.36.2
      - accelerate==1.13.0
      - safetensors==0.7.0
      - datasets==4.8.4
      # ProtT5 tokenizer (cross_architecture_nativeness). ProGen2 loads via
      # transformers trust_remote_code. EvoDiff needs a separate venv — see
      # projects/cross_architecture_nativeness/NOTES.md.
      - sentencepiece==0.2.0
